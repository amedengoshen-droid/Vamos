<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoCharm Go - Daily Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .header p {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }

        .summary-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .summary-card.days {
            border-left-color: #667eea;
        }

        .summary-card.planned {
            border-left-color: #3b82f6;
        }

        .summary-card.accomplished {
            border-left-color: #10b981;
        }

        .summary-card.rate {
            border-left-color: #f59e0b;
        }

        .summary-card label {
            display: block;
            font-size: 0.85em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .summary-card .amount {
            font-size: 1.8em;
            font-weight: 700;
            color: #333;
        }

        .summary-card.days .amount {
            color: #667eea;
        }

        .summary-card.planned .amount {
            color: #3b82f6;
        }

        .summary-card.accomplished .amount {
            color: #10b981;
        }

        .summary-card.rate .amount {
            color: #f59e0b;
        }

        .nav-tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            background: #f8f9fa;
        }

        .nav-tabs button {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1em;
            color: #666;
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-tabs button.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            background: white;
        }

        .nav-tabs button:hover {
            color: #667eea;
        }

        .content {
            padding: 30px;
        }

        .import-export {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-orange {
            background: #f59e0b;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-orange:hover {
            background: #d97706;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            font-size: 1.4em;
            margin-bottom: 20px;
            color: #333;
        }

        .section.planned h2 {
            color: #3b82f6;
        }

        .section.accomplished h2 {
            color: #10b981;
        }

        .section.unplanned h2 {
            color: #f59e0b;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            gap: 12px;
        }

        .item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #3b82f6;
            flex-shrink: 0;
        }

        .item-text {
            flex: 1;
            color: #333;
        }

        .item.done {
            background: #e8f5e9;
        }

        .item.done .item-text {
            text-decoration: line-through;
            color: #999;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 0.95em;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            resize: vertical;
            min-height: 150px;
            margin-bottom: 10px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .modal-content p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .day-selector {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .day-selector label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }

        .day-selector select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            width: 100%;
            max-width: 300px;
        }

        .past-day-view {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .day-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            text-align: center;
        }

        .day-card h4 {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 10px;
        }

        .day-card .completion {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .day-card .ratio {
            font-size: 0.85em;
            color: #999;
        }

        .insights {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .insight-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .insight-card h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .insight-card .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        .tab-content {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        @media (max-width: 768px) {
            .two-columns {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .summary {
                grid-template-columns: 1fr;
            }

            .week-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }

            .nav-tabs {
                flex-wrap: wrap;
            }

            .nav-tabs button {
                flex: 0 1 auto;
                padding: 12px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body onload="initApp()">
    <div class="container">
        <div class="header">
            <h1>✨ GoCharm Go</h1>
            <p>Plan → Track → Accomplish</p>
        </div>

        <div class="summary">
            <div class="summary-card days">
                <label>Days Tracked</label>
                <div class="amount" id="daysTracked">0</div>
            </div>
            <div class="summary-card planned">
                <label>Planned</label>
                <div class="amount" id="plannedCount">0</div>
            </div>
            <div class="summary-card accomplished">
                <label>Accomplished</label>
                <div class="amount" id="accomplishedCount">0</div>
            </div>
            <div class="summary-card rate">
                <label>Completion Rate</label>
                <div class="amount" id="completionRate">0%</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="nav-tabs">
            <button id="tab-daily" class="active" onclick="switchTab('daily')">📅 Daily</button>
            <button id="tab-weekly" onclick="switchTab('weekly')">📈 Weekly</button>
            <button id="tab-monthly" onclick="switchTab('monthly')">📊 Monthly</button>
        </div>

        <div class="content">
            <!-- DAILY TAB -->
            <div id="dailyTab" class="tab-content">
                <div class="import-export">
                    <button class="btn-primary" onclick="openImportModal()">📥 Import Data</button>
                    <button class="btn-secondary" onclick="downloadData()">⬇️ Download Data</button>
                </div>

                <div class="two-columns">
                    <!-- PLANNED SECTION -->
                    <div class="section planned">
                        <h2>🎯 Planned</h2>
                        <div class="input-group">
                            <input 
                                type="text" 
                                id="plannedInput" 
                                placeholder="What do you plan to do?"
                                onkeypress="if(event.key==='Enter') addPlanned()"
                            >
                            <button class="btn-primary" onclick="addPlanned()">Add</button>
                        </div>
                        <div id="plannedList"></div>
                    </div>

                    <!-- ACCOMPLISHED COLUMNS (Main & Unplanned) -->
                    <div>
                        <!-- ACCOMPLISHED SECTION -->
                        <div class="section accomplished">
                            <h2>✅ Accomplished</h2>
                            <div class="input-group">
                                <input 
                                    type="text" 
                                    id="accomplishedInput" 
                                    placeholder="What did you accomplish?"
                                    onkeypress="if(event.key==='Enter') addAccomplished()"
                                >
                                <button class="btn-secondary" onclick="addAccomplished()">Add</button>
                            </div>
                            <div id="accomplishedList"></div>
                        </div>

                        <!-- UNPLANNED ACCOMPLISHED SECTION -->
                        <div class="section unplanned">
                            <h2>⚡ Unplanned Accomplished</h2>
                            <div class="input-group">
                                <input 
                                    type="text" 
                                    id="unplannedInput" 
                                    placeholder="Any unexpected wins today?"
                                    onkeypress="if(event.key==='Enter') addUnplannedAccomplished()"
                                >
                                <button class="btn-orange" onclick="addUnplannedAccomplished()">Add</button>
                            </div>
                            <div id="unplannedList"></div>
                        </div>
                    </div>
                </div>

                <!-- VIEW PAST DAYS -->
                <div class="section" style="margin-top: 40px;">
                    <h2>📋 View Past Days</h2>
                    <div class="day-selector">
                        <label>Select a date:</label>
                        <select id="daySelector" onchange="viewPastDay()">
                            <option value="">-- Choose a date --</option>
                        </select>
                    </div>
                    <div id="pastDayView"></div>
                </div>
            </div>

            <!-- WEEKLY TAB -->
            <div id="weeklyTab" class="tab-content" style="display: none;">
                <h2 style="margin-bottom: 20px;">📈 Last 7 Days Overview</h2>
                <div class="week-grid" id="weekGrid"></div>
            </div>

            <!-- MONTHLY TAB -->
            <div id="monthlyTab" class="tab-content" style="display: none;">
                <h2 style="margin-bottom: 20px;">📊 This Month's Insights</h2>
                <div class="insights" id="monthlyInsights"></div>
            </div>
        </div>
    </div>

    <!-- IMPORT MODAL -->
    <div id="importModal" class="modal">
        <div class="modal-content">
            <h3>📥 Import Data</h3>
            <p>Paste the JSON data code here and click Import:</p>
            <textarea id="importData" placeholder="Paste your JSON code here..."></textarea>
            <div class="modal-buttons">
                <button class="btn-primary" onclick="importData()">Import</button>
                <button onclick="closeImportModal()" style="padding: 10px 20px; background: #ddd; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let data = {};

        function initApp() {
            loadData();
            updateDashboard();
            renderTodayPlanned();
            renderTodayAccomplished();
            renderTodayUnplanned();
            populateDaySelector();
            renderWeekly();
            renderMonthly();
        }

        function getTodayKey() {
            const today = new Date();
            return today.toISOString().split('T')[0];
        }

        function loadData() {
            const saved = localStorage.getItem('goCharmGoData');
            if (saved) {
                try {
                    data = JSON.parse(saved);
                } catch (e) {
                    data = {};
                }
            }
        }

        function saveData() {
            localStorage.setItem('goCharmGoData', JSON.stringify(data));
            updateDashboard();
            populateDaySelector();
            renderWeekly();
            renderMonthly();
        }

        function getDateData(dateKey) {
            if (!data[dateKey]) {
                data[dateKey] = {
                    date: dateKey,
                    planned: [],
                    accomplished: [],
                    unplanned_accomplished: []
                };
            }
            if (!data[dateKey].unplanned_accomplished) {
                data[dateKey].unplanned_accomplished = [];
            }
            return data[dateKey];
        }

        function addPlanned() {
            const input = document.getElementById('plannedInput');
            const text = input.value.trim();
            if (!text) return;

            const today = getTodayKey();
            const dayData = getDateData(today);
            dayData.planned.push({
                id: Date.now(),
                text: text,
                done: false
            });

            saveData();
            input.value = '';
            input.focus();
            renderTodayPlanned();
        }

        function addAccomplished() {
            const input = document.getElementById('accomplishedInput');
            const text = input.value.trim();
            if (!text) return;

            const today = getTodayKey();
            const dayData = getDateData(today);
            dayData.accomplished.push({
                id: Date.now(),
                text: text
            });

            saveData();
            input.value = '';
            input.focus();
            renderTodayAccomplished();
        }

        function addUnplannedAccomplished() {
            const input = document.getElementById('unplannedInput');
            const text = input.value.trim();
            if (!text) return;

            const today = getTodayKey();
            const dayData = getDateData(today);
            dayData.unplanned_accomplished.push({
                id: Date.now(),
                text: text
            });

            saveData();
            input.value = '';
            input.focus();
            renderTodayUnplanned();
        }

        function togglePlanned(id) {
            const today = getTodayKey();
            const dayData = getDateData(today);
            const item = dayData.planned.find(p => p.id === id);
            if (item) {
                item.done = !item.done;
                saveData();
                renderTodayPlanned();
            }
        }

        function deletePlanned(id) {
            const today = getTodayKey();
            const dayData = getDateData(today);
            dayData.planned = dayData.planned.filter(p => p.id !== id);
            saveData();
            renderTodayPlanned();
        }

        function deleteAccomplished(id) {
            const today = getTodayKey();
            const dayData = getDateData(today);
            dayData.accomplished = dayData.accomplished.filter(a => a.id !== id);
            saveData();
            renderTodayAccomplished();
        }

        function deleteUnplanned(id) {
            const today = getTodayKey();
            const dayData = getDateData(today);
            dayData.unplanned_accomplished = dayData.unplanned_accomplished.filter(u => u.id !== id);
            saveData();
            renderTodayUnplanned();
        }

        function renderTodayPlanned() {
            const today = getTodayKey();
            const dayData = getDateData(today);
            const listEl = document.getElementById('plannedList');

            if (dayData.planned.length === 0) {
                listEl.innerHTML = '<div class="empty-state">No planned tasks for today yet.</div>';
                return;
            }

            listEl.innerHTML = dayData.planned.map(item => `
                <div class="item ${item.done ? 'done' : ''}">
                    <input type="checkbox" ${item.done ? 'checked' : ''} onclick="togglePlanned(${item.id})">
                    <span class="item-text">${item.text}</span>
                    <button class="btn-danger" onclick="deletePlanned(${item.id})">Delete</button>
                </div>
            `).join('');
        }

        function renderTodayAccomplished() {
            const today = getTodayKey();
            const dayData = getDateData(today);
            const listEl = document.getElementById('accomplishedList');

            if (dayData.accomplished.length === 0) {
                listEl.innerHTML = '<div class="empty-state">No accomplishments added yet.</div>';
                return;
            }

            listEl.innerHTML = dayData.accomplished.map(item => `
                <div class="item">
                    <span class="item-text">✨ ${item.text}</span>
                    <button class="btn-danger" onclick="deleteAccomplished(${item.id})">Delete</button>
                </div>
            `).join('');
        }

        function renderTodayUnplanned() {
            const today = getTodayKey();
            const dayData = getDateData(today);
            const listEl = document.getElementById('unplannedList');

            if (dayData.unplanned_accomplished.length === 0) {
                listEl.innerHTML = '<div class="empty-state">No unplanned wins logged today.</div>';
                return;
            }

            listEl.innerHTML = dayData.unplanned_accomplished.map(item => `
                <div class="item" style="border-left: 4px solid #f59e0b;">
                    <span class="item-text">⚡ ${item.text}</span>
                    <button class="btn-danger" onclick="deleteUnplanned(${item.id})">Delete</button>
                </div>
            `).join('');
        }

        function updateDashboard() {
            const keys = Object.keys(data);
            document.getElementById('daysTracked').innerText = keys.length;

            let totalPlanned = 0;
            let totalAccomplished = 0;

            keys.forEach(key => {
                const day = data[key];
                totalPlanned += (day.planned || []).length;
                totalAccomplished += (day.accomplished || []).length + ((day.unplanned_accomplished || []).length);
            });

            document.getElementById('plannedCount').innerText = totalPlanned;
            document.getElementById('accomplishedCount').innerText = totalAccomplished;

            let rate = 0;
            if (totalPlanned > 0) {
                rate = Math.round((totalAccomplished / totalPlanned) * 100);
            } else if (totalAccomplished > 0) {
                rate = 100; 
            }

            document.getElementById('completionRate').innerText = rate + '%';
            document.getElementById('progressBar').style.width = Math.min(rate, 100) + '%';
        }

        function populateDaySelector() {
            const selector = document.getElementById('daySelector');
            const currentSelection = selector.value;
            selector.innerHTML = '<option value="">-- Choose a date --</option>';

            Object.keys(data).sort().reverse().forEach(key => {
                const option = document.createElement('option');
                option.value = key;
                option.text = key;
                selector.appendChild(option);
            });

            selector.value = currentSelection;
        }

        function viewPastDay() {
            const dateKey = document.getElementById('daySelector').value;
            const viewEl = document.getElementById('pastDayView');

            if (!dateKey || !data[dateKey]) {
                viewEl.innerHTML = '';
                return;
            }

            const day = data[dateKey];
            let plannedHtml = (day.planned || []).map(item => `
                <div style="margin: 5px 0; color: ${item.done ? '#999' : '#333'}; text-decoration: ${item.done ? 'line-through' : 'none'}">
                    ${item.done ? '☑️' : '⬜'} ${item.text}
                </div>
            `).join('') || '<p style="color:#999">None</p>';

            let accomplishedHtml = (day.accomplished || []).map(item => `
                <div style="margin: 5px 0; color: #10b981;">✨ ${item.text}</div>
            `).join('') || '<p style="color:#999">None</p>';

            let unplannedHtml = (day.unplanned_accomplished || []).map(item => `
                <div style="margin: 5px 0; color: #f59e0b;">⚡ ${item.text}</div>
            `).join('') || '<p style="color:#999">None</p>';

            viewEl.innerHTML = `
                <div class="past-day-view">
                    <h3>Data for ${dateKey}</h3>
                    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-top:15px;">
                        <div>
                            <h4 style="color:#3b82f6; margin-bottom:8px;">🎯 Planned Tasks</h4>
                            ${plannedHtml}
                        </div>
                        <div>
                            <h4 style="color:#10b981; margin-bottom:8px;">✅ Accomplished</h4>
                            ${accomplishedHtml}
                        </div>
                        <div>
                            <h4 style="color:#f59e0b; margin-bottom:8px;">⚡ Unplanned Wins</h4>
                            ${unplannedHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.nav-tabs button').forEach(el => el.classList.remove('active'));

            if (tab === 'daily') {
                document.getElementById('dailyTab').style.display = 'block';
                document.getElementById('tab-daily').classList.add('active');
            } else if (tab === 'weekly') {
                document.getElementById('weeklyTab').style.display = 'block';
                document.getElementById('tab-weekly').classList.add('active');
                renderWeekly();
            } else if (tab === 'monthly') {
                document.getElementById('monthlyTab').style.display = 'block';
                document.getElementById('tab-monthly').classList.add('active');
                renderMonthly();
            }
        }

        function renderWeekly() {
            const gridEl = document.getElementById('weekGrid');
            const sortedKeys = Object.keys(data).sort().slice(-7);

            if (sortedKeys.length === 0) {
                gridEl.innerHTML = '<div class="empty-state">Log data to check your weekly analytics.</div>';
                return;
            }

            gridEl.innerHTML = sortedKeys.map(key => {
                const day = data[key];
                const totalP = (day.planned || []).length;
                const totalA = (day.accomplished || []).length + ((day.unplanned_accomplished || []).length);
                const rate = totalP > 0 ? Math.round((totalA / totalP) * 100) : (totalA > 0 ? 100 : 0);

                return `
                    <div class="day-card">
                        <h4>${key}</h4>
                        <div class="completion">${rate}%</div>
                        <div class="ratio">${totalA}/${totalP} Done</div>
                    </div>
                `;
            }).join('');
        }

        function renderMonthly() {
            const insightsEl = document.getElementById('monthlyInsights');
            const keys = Object.keys(data);

            if (keys.length === 0) {
                insightsEl.innerHTML = '<div class="empty-state">Log data to view month-long trends.</div>';
                return;
            }

            let totalPlanned = 0;
            let totalAccomplished = 0;
            let totalUnplanned = 0;

            keys.forEach(key => {
                const day = data[key];
                totalPlanned += (day.planned || []).length;
                totalAccomplished += (day.accomplished || []).length;
                totalUnplanned += (day.unplanned_accomplished || []).length;
            });

            const overallWins = totalAccomplished + totalUnplanned;
            const avgCompletion = totalPlanned > 0 ? Math.round((overallWins / totalPlanned) * 100) : 0;

            insightsEl.innerHTML = `
                <div class="insight-card">
                    <h4>Avg Month Rate</h4>
                    <div class="value">${avgCompletion}%</div>
                </div>
                <div class="insight-card" style="border-left-color: #10b981;">
                    <h4>Total Planned Done</h4>
                    <div class="value">${totalAccomplished}</div>
                </div>
                <div class="insight-card" style="border-left-color: #f59e0b;">
                    <h4>Total Unplanned Wins</h4>
                    <div class="value">${totalUnplanned}</div>
                </div>
            `;
        }

        function openImportModal() {
            document.getElementById('importModal').classList.add('active');
        }

        function closeImportModal() {
            document.getElementById('importModal').classList.remove('active');
            document.getElementById('importData').value = '';
        }

        function importData() {
            const raw = document.getElementById('importData').value.trim();
            if (!raw) return;

            try {
                const parsed = JSON.parse(raw);
                if (typeof parsed === 'object' && parsed !== null) {
                    Object.keys(parsed).forEach(dateKey => {
                        data[dateKey] = parsed[dateKey];
                        if (!data[dateKey].unplanned_accomplished) {
                            data[dateKey].unplanned_accomplished = [];
                        }
                    });
                    saveData();
                    initApp();
                    closeImportModal();
                    alert('Data loaded successfully!');
                }
            } catch (e) {
                alert('Invalid JSON structure. Verify format and retry.');
            }
        }

        function downloadData() {
            if (Object.keys(data).length === 0) {
                alert('No tracking data found to export.');
                return;
            }
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gocharm_go_backup_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
